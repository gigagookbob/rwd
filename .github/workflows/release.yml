name: Release Publish

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
      target_sha:
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag_name }}
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}

    steps:
      - name: Check if tag already exists
        id: check
        run: |
          if git ls-remote --exit-code --tags "https://github.com/${{ github.repository }}.git" "refs/tags/${{ inputs.tag_name }}" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ inputs.tag_name }} already exists. Skipping release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ inputs.tag_name }} does not exist. Proceeding release."
          fi

  build:
    needs: guard
    if: needs.guard.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../rwd-${{ matrix.target }}.tar.gz rwd
          cd ../../..

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/rwd.exe" -DestinationPath "rwd-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rwd-${{ matrix.target }}
          path: rwd-${{ matrix.target }}.*

  release:
    needs: [guard, build]
    if: needs.guard.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          target_commitish: ${{ inputs.target_sha }}
          generate_release_notes: true
          files: |
            rwd-*.tar.gz
            rwd-*.zip
